# Local development infrastructure for Replayable.
# See infra/README.md for usage.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: replayable-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: replayable
      CLICKHOUSE_USER: replayable
      CLICKHOUSE_PASSWORD: replayable
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: replayable-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: replayable
      POSTGRES_PASSWORD: replayable
      POSTGRES_DB: replayable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U replayable -d replayable"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API server (FastAPI). Commented out until a Dockerfile exists.
  # server:
  #   build:
  #     context: ..
  #     dockerfile: infra/Dockerfile.server
  #   depends_on:
  #     clickhouse:
  #       condition: service_healthy
  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     REPLAYABLE_STORAGE: clickhouse
  #     CLICKHOUSE_URL: http://clickhouse:8123
  #     POSTGRES_URL: postgresql://replayable:replayable@postgres:5432/replayable

  proxy:                  # L4 LLM API proxy (Rust). Sidecar; no DB dependencies.
    build:
      context: ..
      dockerfile: infra/Dockerfile.proxy
    container_name: replayable-proxy
    ports:
      # Bind to loopback only on the host (security review H4). The proxy
      # captures API credentials and request/response bodies and must not
      # be reachable from other hosts on the LAN. Operators who explicitly
      # want LAN exposure can change this to `8088:8080`.
      - "127.0.0.1:8088:8080"
    environment:
      # REPLAYABLE_UPSTREAM_URL is required; the proxy fails fast on startup
      # when it is unset, so operators MUST supply it (e.g. via
      # `docker compose --env-file ./.env up proxy`).
      # The proxy listens on 0.0.0.0 *inside the container* so the host
      # port-mapping above can reach it; loopback-only exposure is
      # enforced by the `127.0.0.1:` prefix on the published port.
      REPLAYABLE_LISTEN: 0.0.0.0:8080
      REPLAYABLE_UPSTREAM_URL: ${REPLAYABLE_UPSTREAM_URL:-}
      REPLAYABLE_LOG_PATH: /home/replayable/replayable-traces.jsonl
      REPLAYABLE_LOG_CHANNEL_CAPACITY: "1024"
      # Secure defaults — see crates/replayable-proxy/README.md for full
      # documentation. Content capture is off; bodies above 10 MiB are
      # rejected with HTTP 413; reqwest has 10s connect and 600s read
      # timeouts; plaintext upstreams are only allowed for loopback.
      REPLAYABLE_CAPTURE_CONTENT: "${REPLAYABLE_CAPTURE_CONTENT:-false}"
      REPLAYABLE_MAX_REQUEST_BYTES: "${REPLAYABLE_MAX_REQUEST_BYTES:-10485760}"
      REPLAYABLE_CONNECT_TIMEOUT_SECS: "${REPLAYABLE_CONNECT_TIMEOUT_SECS:-10}"
      REPLAYABLE_READ_TIMEOUT_SECS: "${REPLAYABLE_READ_TIMEOUT_SECS:-600}"
      REPLAYABLE_UPSTREAM_ALLOW_PLAINTEXT: "${REPLAYABLE_UPSTREAM_ALLOW_PLAINTEXT:-false}"
    volumes:
      - proxy_traces:/home/replayable
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  clickhouse_data:
  postgres_data:
  proxy_traces:
